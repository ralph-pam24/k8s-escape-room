# =====================================================================
# Scenario 4 – Security Vault (Secret)
# Bug: Secret holds password "guest". Backend expects "level5-badge".
# Fix: Recreate the Secret with password=level5-badge.
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: security
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-credentials
  namespace: security
type: Opaque
stringData:
  username: "admin"
  password: "guest"          # BUG: wrong password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=AUTH_OK level5-badge"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: security
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-client
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-client
  template:
    metadata:
      labels:
        app: vault-client
    spec:
      containers:
        - name: client
          image: curlimages/curl:8.4.0
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                PASS=$(cat /etc/vault/password)
                RESP=$(curl -s auth-service.security.svc.cluster.local)
                EXPECTED=$(echo "$RESP" | awk '{print $2}')
                if [ "$PASS" = "$EXPECTED" ]; then
                  echo "[OK] Vault opened. Level 5 Security Badge released."
                else
                  echo "[ERROR] Authentication failed. Vault password '$PASS' rejected."
                fi
                sleep 5
              done
          volumeMounts:
            - name: creds
              mountPath: /etc/vault
              readOnly: true
      volumes:
        - name: creds
          secret:
            secretName: vault-credentials
