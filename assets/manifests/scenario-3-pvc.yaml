# =====================================================================
# Scenario 3 – Storage Rack Expansion Plan (PVC)
# Bug: PVC is only 50Mi. App fills it up -> "No space left on device".
# Fix: Patch PVC to >=500Mi and restart the deployment.
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: archive
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: expandable
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: archive-rack
  namespace: archive
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: expandable
  resources:
    requests:
      storage: 50Mi                 # BUG: too small
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: archive-writer
  namespace: archive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: archive-writer
  template:
    metadata:
      labels:
        app: archive-writer
    spec:
      containers:
        - name: writer
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                i=$((i+1))
                if dd if=/dev/zero of=/data/record-$i.bin bs=1M count=1 2>/tmp/err; then
                  echo "[OK] Stored record $i"
                else
                  echo "[ERROR] $(cat /tmp/err)"
                fi
                sleep 2
              done
          volumeMounts:
            - name: rack
              mountPath: /data
      volumes:
        - name: rack
          persistentVolumeClaim:
            claimName: archive-rack
