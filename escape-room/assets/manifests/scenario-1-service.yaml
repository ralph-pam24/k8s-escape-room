# =====================================================================
# Scenario 1 – Reception Desk (Service)
# Bug: Service selector does NOT match the pod labels.
# Fix: Change Service.spec.selector to  app: reception
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: reception
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reception-app
  namespace: reception
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reception
  template:
    metadata:
      labels:
        app: reception
    spec:
      containers:
        - name: web
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Welcome to the Reception Desk. Access Card Dispenser: UNLOCKED"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: reception-desk
  namespace: reception
spec:
  type: ClusterIP
  selector:
    app: reception-desk       # BUG: wrong label, no pods match
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: v1
kind: Pod
metadata:
  name: visitor
  namespace: reception
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.4.0
      command: ["sleep", "3600"]
