# =====================================================================
# Scenario 1 – Reception Desk (Service)
# Bug: Service selector does NOT match the pod labels.
# Fix: Update Service.spec.selector to  app: reception
# Full success reward embedded in the pod response.
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: reception
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reception-app
  namespace: reception
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reception
  template:
    metadata:
      labels:
        app: reception
    spec:
      containers:
        - name: web
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /www
              cat > /www/index.html <<'PAGE'

              =========================================================
                            RECEPTION DESK - FACILITY LOBBY
              =========================================================

               ✅ You've resolved the issue.
                  The visitor can now reach the correct department.

               In Kubernetes, a Service uses a label selector to forward
               traffic to matching Pods. When the selector matches the
               Pod labels, traffic reaches healthy backends and the
               application responds correctly.

               ---------------------------------------------------------
                            CODE: "RECEPTION-OPEN-42"
               ---------------------------------------------------------

               Copy the CODE WORD above and paste it into the browser
               game to unlock the next room.

               Click "CHECK" to verify and to enter Room 2.

              =========================================================

              PAGE
              busybox httpd -f -p 5678 -h /www
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: reception-desk
  namespace: reception
spec:
  type: ClusterIP
  selector:
    app: reception-desk       # BUG: wrong label, no pods match
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: v1
kind: Pod
metadata:
  name: visitor
  namespace: reception
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.4.0
      command: ["sleep", "3600"]