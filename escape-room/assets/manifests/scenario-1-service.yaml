# =====================================================================
# Scenario 1 - Reception Desk (Service)
# Bug: Service selector does NOT match the pod labels.
# Fix: Update Service.spec.selector to app=reception
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: reception
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: reception-reward
  namespace: reception
data:
  reward.txt: |2

    =========================================================
                  RECEPTION DESK - FACILITY LOBBY
    =========================================================

     You have resolved the issue.
     The visitor can now reach the correct department.

     In Kubernetes, a Service uses a label selector to
     forward traffic to matching Pods. When the selector
     matches the Pod labels, traffic reaches healthy
     backends and the application responds correctly.

     ---------------------------------------------------------
                  CODE: RECEPTION-OPEN-42
     ---------------------------------------------------------

     Copy the CODE WORD above and paste it into the browser
     game to unlock the next room.

     Click Next Step below after clicking CHECK to enter
     Room 2.

    =========================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reception-app
  namespace: reception
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reception
  template:
    metadata:
      labels:
        app: reception
    spec:
      containers:
        - name: web
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              TS() { date -u '+%Y-%m-%dT%H:%M:%SZ'; }
              mkdir -p /www
              {
                echo "$(TS) INFO  reception-api v1.8.2 starting"
                echo "$(TS) INFO  Loading routing configuration"
                echo "$(TS) INFO  Service endpoint registration complete"
                echo "$(TS) INFO  Backend pods discovered: 2"
                echo "$(TS) INFO  Health checks passed"
                echo "$(TS) INFO  Visitor request accepted"
                echo "$(TS) INFO  Routing visitor to Reception Desk"
                cat /reward/reward.txt
              } > /www/index.html
              exec busybox httpd -f -p 5678 -h /www
          ports:
            - containerPort: 5678
          volumeMounts:
            - name: reward
              mountPath: /reward
              readOnly: true
      volumes:
        - name: reward
          configMap:
            name: reception-reward
---
apiVersion: v1
kind: Service
metadata:
  name: reception-desk
  namespace: reception
spec:
  selector:
    app: reception-desk   # BUG
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: v1
kind: Pod
metadata:
  name: visitor
  namespace: reception
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.4.0
      command:
        - sleep
        - "3600"