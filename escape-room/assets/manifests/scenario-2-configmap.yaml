# =====================================================================
# Scenario 2 – Blueprint Cabinet (ConfigMap)
# Bug: ConfigMap exists but is missing BLUEPRINT_CODE
# Fix: Add BLUEPRINT_CODE=ENG-WING-OPEN and restart deployment
# Reward code word: BLUEPRINT-B7-DELTA
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: engineering
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: facility-blueprint
  namespace: engineering
data:
  FACILITY_NAME: "Kubernetes Escape Complex"
  WING_ID: "engineering"
  # BLUEPRINT_CODE intentionally missing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-door-controller
  namespace: engineering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-door
  template:
    metadata:
      labels:
        app: storage-door
    spec:
      containers:
        - name: app
          image: busybox:1.36
          envFrom:
            - configMapRef:
                name: facility-blueprint
          command:
            - sh
            - -c
            - |
              if [ -z "$BLUEPRINT_CODE" ]; then
                echo "2026-07-21T02:14:31Z INFO  storage-door-controller v2.7.1 starting"
                echo "2026-07-21T02:14:31Z INFO  Loading engineering wing configuration"
                echo "2026-07-21T02:14:32Z INFO  Blueprint source: facility-blueprint"
                echo ""
                echo "2026-07-21T02:14:32Z ERROR Configuration validation failed"
                echo "2026-07-21T02:14:32Z ERROR Missing required parameter: BLUEPRINT_CODE"
                echo "2026-07-21T02:14:32Z ERROR Expected value: ENG-WING-OPEN"
                echo "2026-07-21T02:14:32Z ERROR Storage door initialization aborted"
                echo "2026-07-21T02:14:32Z INFO  Exit code: 1"
                sleep 5
                exit 1
              fi

              if [ "$BLUEPRINT_CODE" != "ENG-WING-OPEN" ]; then
                echo "2026-07-21T02:14:32Z ERROR Configuration validation failed"
                echo "2026-07-21T02:14:32Z ERROR Invalid BLUEPRINT_CODE"
                echo "2026-07-21T02:14:32Z ERROR Expected value: ENG-WING-OPEN"
                sleep 5
                exit 1
              fi

              echo "2026-07-21T02:18:42Z INFO  storage-door-controller v2.7.1 starting"
              echo "2026-07-21T02:18:42Z INFO  Loading engineering wing configuration"
              echo "2026-07-21T02:18:43Z INFO  Blueprint source: facility-blueprint"
              echo "2026-07-21T02:18:43Z INFO  Blueprint code validated"
              echo "2026-07-21T02:18:44Z INFO  Door controller initialized"
              echo "2026-07-21T02:18:44Z INFO  Engineering wing access restored"
              echo ""

              cat <<'BOX'

=========================================================
          BLUEPRINT CABINET — ENGINEERING WING
=========================================================

 ✅ You've resolved the issue.
    The storage-door controller now has its instructions
    and the Blueprint Cabinet unlocks.

    In Kubernetes, a ConfigMap holds non-sensitive
    configuration such as URLs, ports, and application
    settings. Pods consume ConfigMaps via envFrom, env
    valueFrom, or volume mounts. Missing keys leave apps
    without the config they need to operate.

 ---------------------------------------------------------
              CODE: "BLUEPRINT-B7-DELTA"
 ---------------------------------------------------------

    Copy the CODE WORD above and paste it into the browser
    game to unlock the next room.

    Click "Next Step" below (after clicking CHECK) to enter
    Room 3.

=========================================================

BOX

              sleep infinity