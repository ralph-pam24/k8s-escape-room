# =====================================================================
# Scenario 2 – Blueprint Cabinet (ConfigMap)
# Bug: ConfigMap "facility-blueprint" exists but is missing key
#      BLUEPRINT_CODE.
# Fix: Add BLUEPRINT_CODE=ENG-WING-OPEN to the ConfigMap and restart
#      the deployment.
# Reward code word: BLUEPRINT-B7-DELTA
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: engineering
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: facility-blueprint
  namespace: engineering
data:
  FACILITY_NAME: "Kubernetes Escape Complex"
  WING_ID: "engineering"
  # BLUEPRINT_CODE intentionally missing
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blueprint-reward
  namespace: engineering
data:
  reward.txt: |
    =========================================================
              BLUEPRINT CABINET — ENGINEERING WING
    =========================================================

     ✅ You've resolved the issue.
        The storage-door controller now has its instructions
        and the Blueprint Cabinet unlocks.

     In Kubernetes, a ConfigMap holds non-sensitive
     configuration such as URLs, ports, and application
     settings. Pods consume ConfigMaps via envFrom, env
     valueFrom, or volume mounts. Missing keys leave apps
     without the config they need to operate.

     ---------------------------------------------------------
                  CODE: "BLUEPRINT-B7-DELTA"
     ---------------------------------------------------------

     Copy the CODE WORD above and paste it into the browser
     game to unlock the next room.

     Click "Next Step" below (after clicking CHECK) to enter
     Room 3.

    =========================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-door-controller
  namespace: engineering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-door
  template:
    metadata:
      labels:
        app: storage-door
    spec:
      containers:
        - name: app
          image: busybox:1.36
          envFrom:
            - configMapRef:
                name: facility-blueprint
          command:
            - sh
            - -c
            - |
              TS() { date -u '+%Y-%m-%dT%H:%M:%SZ'; }

              if [ -z "$BLUEPRINT_CODE" ]; then
                echo "$(TS) INFO  storage-door-controller v2.7.1 starting"
                echo "$(TS) INFO  Loading engineering wing configuration"
                echo "$(TS) INFO  Blueprint source: facility-blueprint"
                echo ""
                echo "$(TS) ERROR Configuration validation failed"
                echo "$(TS) ERROR Missing required parameter: BLUEPRINT_CODE"
                echo "$(TS) ERROR Expected value: ENG-WING-OPEN"
                echo "$(TS) ERROR Storage door initialization aborted"
                echo "$(TS) INFO  Exit code: 1"
                sleep 5
                exit 1
              fi

              if [ "$BLUEPRINT_CODE" != "ENG-WING-OPEN" ]; then
                echo "$(TS) ERROR Configuration validation failed"
                echo "$(TS) ERROR Invalid BLUEPRINT_CODE value"
                echo "$(TS) ERROR Expected value: ENG-WING-OPEN"
                sleep 5
                exit 1
              fi

              echo "$(TS) INFO  storage-door-controller v2.7.1 starting"
              echo "$(TS) INFO  Loading engineering wing configuration"
              echo "$(TS) INFO  Blueprint source: facility-blueprint"
              echo "$(TS) INFO  Blueprint code validated"
              echo "$(TS) INFO  Door controller initialized"
              echo "$(TS) INFO  Engineering wing access restored"
              echo ""
              cat /reward/reward.txt
              sleep infinity
          volumeMounts:
            - name: reward
              mountPath: /reward
              readOnly: true
      volumes:
        - name: reward
          configMap:
            name: blueprint-reward