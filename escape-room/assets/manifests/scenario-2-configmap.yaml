# =====================================================================
# Scenario 2 - Blueprint Cabinet (ConfigMap)
# Bug: ConfigMap facility-blueprint is missing BLUEPRINT_CODE.
# Fix: Add BLUEPRINT_CODE=ENG-WING-OPEN and restart the deployment.
# Reward code: BLUEPRINT-B7-DELTA
# Reward text is base64-encoded in a decoy Secret (door-tls-cert).
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: engineering
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: facility-blueprint
  namespace: engineering
data:
  FACILITY_NAME: "Kubernetes Escape Complex"
  WING_ID: "engineering"
---
apiVersion: v1
kind: Secret
metadata:
  name: door-tls-cert
  namespace: engineering
type: Opaque
data:
  bundle.pem: 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-door-controller
  namespace: engineering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-door
  template:
    metadata:
      labels:
        app: storage-door
    spec:
      containers:
        - name: app
          image: busybox:1.36
          envFrom:
            - configMapRef:
                name: facility-blueprint
          command:
            - sh
            - -c
            - |
              TS() { date -u '+%Y-%m-%dT%H:%M:%SZ'; }
              if [ -z "$BLUEPRINT_CODE" ]; then
                echo "$(TS) INFO  storage-door-controller v2.7.1 starting"
                echo "$(TS) INFO  Loading engineering wing configuration"
                echo "$(TS) INFO  Blueprint source: facility-blueprint"
                echo "$(TS) ERROR Configuration validation failed"
                echo "$(TS) ERROR Missing required parameter: BLUEPRINT_CODE"
                echo "$(TS) ERROR Expected value: ENG-WING-OPEN"
                echo "$(TS) ERROR Storage door initialization aborted"
                sleep 5
                exit 1
              fi
              if [ "$BLUEPRINT_CODE" != "ENG-WING-OPEN" ]; then
                echo "$(TS) ERROR Invalid BLUEPRINT_CODE value"
                sleep 5
                exit 1
              fi
              echo "$(TS) INFO  storage-door-controller v2.7.1 starting"
              echo "$(TS) INFO  Loading engineering wing configuration"
              echo "$(TS) INFO  Blueprint source: facility-blueprint"
              echo "$(TS) INFO  Blueprint code validated"
              echo "$(TS) INFO  Door controller initialized"
              echo "$(TS) INFO  Engineering wing access restored"
              echo ""
              cat /vault/bundle.pem | base64 -d
              sleep infinity
          volumeMounts:
            - name: vault
              mountPath: /vault
              readOnly: true
      volumes:
        - name: vault
          secret:
            secretName: door-tls-cert