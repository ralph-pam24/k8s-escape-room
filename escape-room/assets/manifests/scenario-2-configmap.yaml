# =====================================================================
# Scenario 2 – Blueprint Cabinet (ConfigMap)
# Bug: ConfigMap "facility-blueprint" exists but is missing the key
#      BLUEPRINT_CODE.
# Fix: Add key BLUEPRINT_CODE=ENG-WING-OPEN to the ConfigMap and
#      restart the deployment.
# Reward code word: BLUEPRINT-B7-DELTA (appears only after fix).
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: engineering
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: facility-blueprint
  namespace: engineering
data:
  FACILITY_NAME: "Kubernetes Escape Complex"
  WING_ID: "engineering"
  # BLUEPRINT_CODE is missing on purpose
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-door-controller
  namespace: engineering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-door
  template:
    metadata:
      labels:
        app: storage-door
    spec:
      containers:
        - name: app
          image: busybox:1.36
          envFrom:
            - configMapRef:
                name: facility-blueprint
          command:
            - sh
            - -c
            - |
              while true; do
                if [ -z "$BLUEPRINT_CODE" ]; then
                  echo "[ERROR] Missing operating instructions."
                  echo "[ERROR] Required key:   BLUEPRINT_CODE"
                  echo "[ERROR] Required value: ENG-WING-OPEN"
                  echo "[ERROR] Storage doors will not open."
                elif [ "$BLUEPRINT_CODE" = "ENG-WING-OPEN" ]; then
                  cat <<'BOX'

              =========================================================
                            BLUEPRINT CABINET — ENGINEERING WING
              =========================================================

               ✅ You've resolved the issue.
                  The storage-door controller now has its instructions
                  and the Blueprint Cabinet unlocks.

               In Kubernetes, a ConfigMap holds non-sensitive
               configuration such as URLs, ports, and application
               settings. Pods consume ConfigMaps via envFrom, env
               valueFrom, or volume mounts. Missing keys leave apps
               without the config they need to operate.

               ---------------------------------------------------------
                            CODE: "BLUEPRINT-B7-DELTA"
               ---------------------------------------------------------

               Copy the CODE WORD above and paste it into the browser
               game to unlock the next room.

               Click "Next Step" below (after clicking CHECK) to enter
               Room 3.

              =========================================================

              BOX
                else
                  echo "[ERROR] Invalid BLUEPRINT_CODE: '$BLUEPRINT_CODE'"
                  echo "[ERROR] Expected: ENG-WING-OPEN"
                fi
                sleep 5
              done