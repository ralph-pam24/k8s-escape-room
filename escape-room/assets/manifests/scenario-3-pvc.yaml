# =====================================================================
# Scenario 3 – Storage Rack Expansion Plan (PVC)
# Bug: PVC "archive-rack" is only 50Mi. Pod queries the K8s API for
#      its own PVC spec and crashes if requested size is <= 50Mi.
# Fix: Expand the PVC beyond 50Mi and restart the deployment.
# Reward: /data/expansion-plan.txt with code EXPANSION-9K-VAULT.
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: archive
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: archive-writer
  namespace: archive
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pvc-reader
  namespace: archive
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: archive-writer-pvc-reader
  namespace: archive
subjects:
  - kind: ServiceAccount
    name: archive-writer
    namespace: archive
roleRef:
  kind: Role
  name: pvc-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: expandable-storage
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: archive-rack
  namespace: archive
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: expandable-storage
  resources:
    requests:
      storage: 50Mi        # BUG: too small
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: archive-writer
  namespace: archive
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: archive-writer
  template:
    metadata:
      labels:
        app: archive-writer
    spec:
      serviceAccountName: archive-writer
      containers:
        - name: writer
          image: curlimages/curl:8.4.0
          command:
            - sh
            - -c
            - |
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              API=https://kubernetes.default.svc

              PVC_JSON=$(curl -sk -H "Authorization: Bearer $TOKEN" \
                $API/api/v1/namespaces/$NS/persistentvolumeclaims/archive-rack)

              # Strip whitespace so the regex matches regardless of JSON pretty-print
              SIZE=$(echo "$PVC_JSON" | tr -d ' \n\t' \
                | grep -oE '"storage":"[0-9]+[A-Za-z]+"' \
                | head -1 | sed 's/.*"storage":"\([^"]*\)".*/\1/')

              echo "[INFO] Storage rack capacity: $SIZE"

              # Normalize to Mi
              NUM=$(echo "$SIZE" | grep -oE '[0-9]+')
              UNIT=$(echo "$SIZE" | grep -oE '[A-Za-z]+')
              case "$UNIT" in
                Gi) MI=$((NUM * 1024)) ;;
                Mi) MI=$NUM ;;
                Ki) MI=$((NUM / 1024)) ;;
                *)  MI=0 ;;
              esac

              if [ "$MI" -le 50 ]; then
                echo "[ERROR] Storage rack full — only ${SIZE} capacity."
                echo "[ERROR] Cannot store new archive records."
                echo "[ERROR] Rack must be expanded."
                sleep 5
                exit 1
              fi

              cat > /data/expansion-plan.txt <<'BOX'

              =========================================================
                            STORAGE RACK — ARCHIVE WAREHOUSE
              =========================================================

               ✅ You've resolved the issue.
                  The storage racks have been expanded and new archive
                  records can now be stored.

               In Kubernetes, a PersistentVolumeClaim (PVC) requests
               storage of a specific size. When applications outgrow
               their claim, administrators can expand it (if the
               StorageClass allows expansion) by patching the PVC's
               requested storage, then restarting the pod so the
               filesystem is resized.

               ---------------------------------------------------------
                            CODE: "EXPANSION-9K-VAULT"
               ---------------------------------------------------------

               Copy the CODE WORD above and paste it into the browser
               game to unlock the next room.

               Click "Next Step" below (after clicking CHECK) to enter
               Room 4.

              =========================================================

              BOX

              echo "[OK] Storage rack expanded to ${SIZE}."
              sleep infinity
          volumeMounts:
            - name: rack
              mountPath: /data
      volumes:
        - name: rack
          persistentVolumeClaim:
            claimName: archive-rack