# =====================================================================
# Scenario 5 – Security Gate Control Panel (NetworkPolicy)
# Bug: NetworkPolicy has empty ingress (deny all) selecting exit-door.
# Fix: Allow ingress from pods with label app=control-panel on TCP 5678.
# NOTE: Requires a NetworkPolicy-capable CNI (Calico installed by
#       background.sh).
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: exit
  labels:
    name: exit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exit-door
  namespace: exit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exit-door
  template:
    metadata:
      labels:
        app: exit-door
    spec:
      containers:
        - name: door
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=ALL FACILITY SYSTEMS RESTORED - FINAL EXIT DOOR UNLOCKED"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: exit-door
  namespace: exit
spec:
  selector:
    app: exit-door
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-panel
  namespace: exit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-panel
  template:
    metadata:
      labels:
        app: control-panel
    spec:
      containers:
        - name: panel
          image: curlimages/curl:8.4.0
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                if curl -sS --max-time 3 exit-door.exit.svc.cluster.local > /tmp/out 2>&1; then
                  echo "[OK] $(cat /tmp/out)"
                else
                  echo "[ERROR] Control Panel cannot reach Exit Door (network blocked)."
                fi
                sleep 5
              done
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: exit-door-lockdown
  namespace: exit
spec:
  podSelector:
    matchLabels:
      app: exit-door
  policyTypes:
    - Ingress
  ingress: []                 # BUG: empty ingress = deny all
