# =====================================================================
# Scenario 4 – Security Vault (Secret)
# Bug: vault-client Deployment mounts Secret "vault-creds" — which does
#      not exist. Pod fails with CreateContainerConfigError.
# Fix: Change secretName to "vault-credentials" (or rename the Secret).
# Reward: /vault/open <user> <pass> prints the code word LEVEL5-GRANTED-XR
#         when the args match the mounted credentials.
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: security
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-credentials
  namespace: security
type: Opaque
stringData:
  username: "admin"
  password: "level5-badge"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-client
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-client
  template:
    metadata:
      labels:
        app: vault-client
    spec:
      containers:
        - name: client
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Install the /vault/open helper
              mkdir -p /vault
              cat > /vault/open <<'SCRIPT'
              #!/bin/sh
              PROVIDED_USER="$1"
              PROVIDED_PASS="$2"
              EXPECTED_USER=$(cat /etc/vault/username)
              EXPECTED_PASS=$(cat /etc/vault/password)

              if [ -z "$PROVIDED_USER" ] || [ -z "$PROVIDED_PASS" ]; then
                echo "[ERROR] Usage: /vault/open <username> <password>"
                exit 1
              fi

              if [ "$PROVIDED_USER" = "$EXPECTED_USER" ] && [ "$PROVIDED_PASS" = "$EXPECTED_PASS" ]; then
                cat <<'BOX'

              =========================================================
                            SECURITY VAULT — LEVEL 5 BADGE
              =========================================================

               ✅ Access granted. Level 5 Security Badge retrieved.

               In Kubernetes, a Secret stores sensitive data such as
               usernames, passwords, API keys, and tokens. Values are
               base64-encoded but NOT encrypted. Pods consume Secrets
               through mounted volumes or environment variables. When
               a Secret is misreferenced, the pod fails to start with
               a CreateContainerConfigError.

               ---------------------------------------------------------
                            CODE: "LEVEL5-GRANTED-XR"
               ---------------------------------------------------------

               Copy the CODE WORD above and paste it into the browser
               game to unlock the next room.

               Click "Next Step" below (after clicking CHECK) to enter
               Room 5.

              =========================================================

              BOX
                # Mirror the reward into the pod's main log for verifier
                cp /vault/last-reward.txt /proc/1/fd/1 2>/dev/null || true
                echo "LEVEL5-GRANTED-XR" > /vault/unlocked
              else
                echo "[ERROR] Authentication failed."
                echo "[ERROR] Use the credentials stored in the vault-credentials Secret."
                exit 1
              fi
              SCRIPT
              chmod +x /vault/open

              # Startup log sequence (goes to stdout = pod logs)
              TS() { date -u '+%Y-%m-%d %H:%M:%S'; }
              echo "[$(TS)] vault-client v2.4.1 initializing"
              echo "[$(TS)] Loading credentials from /etc/vault"
              echo "[$(TS)] Authentication module loaded"
              echo "[$(TS)] Session engine ready"
              echo "[$(TS)] READY"
              echo ""
              echo "[$(TS)] To retrieve the Level 5 Security Badge, run the following command"
              echo "[$(TS)] using the credentials stored in the vault-credentials Secret:"
              echo ""
              echo "         kubectl -n security exec deploy/vault-client -- \\"
              echo "           /vault/open <username> <password>"
              echo ""

              # Periodically check if the vault has been unlocked, then
              # print the reward into the main pod log so the verifier
              # can find it.
              while true; do
                if [ -f /vault/unlocked ] && [ ! -f /vault/logged ]; then
                  echo ""
                  echo "[$(TS)] Vault unlocked. Badge released."
                  echo ""
                  echo "=========================================================
                            SECURITY VAULT — LEVEL 5 BADGE
              ========================================================="
                  echo ""
                  echo " ✅ Access granted. Level 5 Security Badge retrieved."
                  echo ""
                  echo " In Kubernetes, a Secret stores sensitive data such as"
                  echo " usernames, passwords, API keys, and tokens. Values are"
                  echo " base64-encoded but NOT encrypted. Pods consume Secrets"
                  echo " through mounted volumes or environment variables. When"
                  echo " a Secret is misreferenced, the pod fails to start with"
                  echo " a CreateContainerConfigError."
                  echo ""
                  echo " ---------------------------------------------------------"
                  echo '              CODE: "LEVEL5-GRANTED-XR"'
                  echo " ---------------------------------------------------------"
                  echo ""
                  echo " Copy the CODE WORD above and paste it into the browser"
                  echo " game to unlock the next room."
                  echo ""
                  echo ' Click "Next Step" below (after clicking CHECK) to enter'
                  echo " Room 5."
                  echo ""
                  echo "========================================================="
                  touch /vault/logged
                fi
                sleep 5
              done
          volumeMounts:
            - name: creds
              mountPath: /etc/vault
              readOnly: true
      volumes:
        - name: creds
          secret:
            secretName: vault-creds   # BUG: wrong name (does not exist)